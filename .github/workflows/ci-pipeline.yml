name: Java Microservices Engine CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-ship:
    runs-on: ubuntu-latest

    # Run only when commit message contains "generate build"
    if: contains(github.event.head_commit.message, 'generate build')

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21 JDK Runtime
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Spring Boot Application
        run: |
          mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:${{ github.sha }}

      - name: Update Kubernetes Deployment Manifest
        run: |
          sed -i "s|image: .*kafka-consumer:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:${{ github.sha }}|g" k8s/consumer-deployment.yaml

          echo "===== Updated Manifest ====="
          cat k8s/consumer-deployment.yaml

      - name: Commit and Push Manifest Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/consumer-deployment.yaml

          git commit -m "chore: update consumer image to ${{ github.sha }} [skip ci]" || echo "No changes detected"

          git push origin main