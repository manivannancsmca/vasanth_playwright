apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-kafka-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/manivannancsmca/eks-kafka-consumer-app.git'
    targetRevision: HEAD
    path: 'k8s' # Scans entire directory root for infra and application components
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true